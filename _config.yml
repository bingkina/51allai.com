title: 51AllAI
subtitle: 探索 AI 的无限可能
description: 24小时实时追踪全球AI科技新闻，第一时间报道OpenAI、Google、百度等巨头最新动态。聚焦深度学习技术突破与生成式AI商业落地，为您提供最快、最全的人工智能行业快讯和独家解读。
keywords: 人工智能, AI, AI新闻, AI资讯, 生成式AI, AIGC, 深度学习, OpenAI, 大模型, 科技快讯, 人工智能行业动态
author: 51ALLAI
language: zh-CN
timezone: Asia/Shanghai
url: https://51allai.com
permalink: posts/:year/:month/:slug/
permalink_defaults: null
pretty_urls:
  # false：去掉 index.html 与 .html 后缀，canonical 指向干净 URL，
  # 避免 GSC「Duplicate without canonical」把 / 与 /index.html 视作两个 URL
  trailing_index: false
  trailing_html: false
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: ':lang'
skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: ''
  per_page: 10
  order_by: '-date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: date  # sitemap lastmod 用文章发布日期，而不是文件 mtime（避免任何重写 frontmatter 都让 Google 以为所有文章都更新了）
per_page: 10
pagination_dir: page
# 强制包含 _redirects：Hexo 默认忽略下划线前缀的文件，需显式声明
include:
  - _redirects
exclude: null
ignore: null
theme: vivia
deploy:
  type: ''

# Vivia 主题配置：归档页禁用分页
archive_generator:
  per_page: 0

# 搜索配置
search:
  path: search.xml
  field: post
  content: true

# Algolia 搜索配置 (hexo-algoliasearch)
# SECURITY: adminApiKey 不再写在此处，改用环境变量 HEXO_ALGOLIA_INDEXING_KEY
#   发布前执行:  export HEXO_ALGOLIA_INDEXING_KEY=xxxxxxxx
# 旧的 adminApiKey 请立即在 Algolia 控制台吊销并重新生成。
algolia:
  appId: DB7LNOTMKC
  apiKey: 8d8f5aa02241c1a6bb5134b0b9c9fd8e
  indexName: 51allai
  chunkSize: 5000
  fields:
    - title
    - slug
    - path
    - categories
    - tags
    - date
    - content

# SEO 优化 - 站点地图
sitemap:
  path: sitemap.xml
  rel: true
  tags: true
  categories: true

# SEO 优化 - RSS 订阅
feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true
  content_limit: 200

# IndexNow — 向 Bing / Yandex 即时推送新文章
hexo_indexnow:
  apikey: 079f705e44c06b2187c75b7f65cecfce
  server: indexnow  # 使用 indexnow.org 统一入口，同时覆盖 Bing + Yandex + Google
  count: 10  # 每次推送最近 10 篇文章（避免多篇文章同时发布时只推 1 篇）
  txt_name: indexnow  # key 文件名：{txt_name}.txt
  log_urls: true

# Baidu URL Submit — 百度站长平台主动推送（百度不支持 IndexNow）
baidu_url_submit:
  token: 0ZbcllZSIWauNn2r  # 百度站长平台主动推送准入密钥
  count: 10  # 每次推送最近 10 篇文章
