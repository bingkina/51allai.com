<!DOCTYPE html>
<html lang="zh-CN" theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>页面未找到 | 51AllAI</title>
  <meta name="description" content="您访问的页面不存在，请检查链接或返回首页。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Helvetica, Arial, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; max-width: 500px; padding: 40px 20px; }
    h1 { font-size: 6em; font-weight: 800; color: #5e5ce6; margin-bottom: 0.1em; }
    h2 { font-size: 1.4em; font-weight: 500; margin-bottom: 0.8em; }
    p { color: #888; line-height: 1.7; margin-bottom: 2em; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.95em;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-primary { background: #5e5ce6; color: #fff; }
    .btn-primary:hover { background: #4a48d4; }
    .btn-secondary { background: #1e1e30; color: #ccc; border: 1px solid #333; }
    .btn-secondary:hover { background: #2a2a40; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>页面未找到</h2>
    <p>您访问的页面可能已被移动、删除，或链接有误。</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">返回首页</a>
      <a class="btn btn-secondary" href="/archives/">浏览归档</a>
      <a class="btn btn-secondary" href="/sitemap.xml">站点地图</a>
    </div>
  </div>
</body>
</html>
